<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Ambiente VR - Panorama</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>

<body>

  <a-scene>
    <a-assets>
      <img id="panorama-quarto" src="0Romm.jpg" alt="Panorama do ambiente">
    </a-assets>

    <a-cylinder
      id="panorama-cylinder"
      src="#panorama-quarto"
      radius="65"
      height="150"
      position="0 2.4 0"
      open-ended="true"
      rotation="0 -90 0"
      side="double"
      material="repeat: 1 1">
    </a-cylinder>

    <a-entity id="heatmap-layer"></a-entity>

    <a-sky color="#111"></a-sky>
    <a-entity camera="fov: 80" look-controls position="0 2.4 0" rotation="0 0 0"></a-entity>

  </a-scene>

  <script>
    const CAMINHO_HEATMAP = '/api/heatmap';
    const ALTURA_HEATMAP = -0.25;
    const INTERVALO_ATUALIZACAO_MS = 2000;

    async function carregarDadosHeatmap() {
      try {
        const resposta = await fetch(`${CAMINHO_HEATMAP}?t=${Date.now()}`);
        if (!resposta.ok) {
          throw new Error(`Falha ao carregar o heatmap: HTTP ${resposta.status}`);
        }

        const payload = await resposta.json();
        const dados = normalizarDadosHeatmap(payload);
        criarHeatmap(dados.points);
      } catch (erro) {
        console.error('Nao foi possivel carregar os dados do heatmap.', erro);
      }
    }

    function normalizarDadosHeatmap(payload) {
      const pontos = Array.isArray(payload?.points) ? payload.points : [];
      return {
        updatedAt: payload?.updated_at || null,
        points: pontos.map((ponto) => ({
          id: ponto.id || ponto.camera_id || 'camera',
          x: Number(ponto.x) || 0,
          y: Number(ponto.y),
          z: Number(ponto.z) || 0,
          pessoas: Number(ponto.pessoas) || 0
        }))
      };
    }

    function criarHeatmap(pontos) {
      const camadaHeatmap = document.getElementById('heatmap-layer');
      camadaHeatmap.innerHTML = '';

      pontos.forEach((ponto) => {
        const pessoas = Math.max(0, Math.min(100, Number(ponto.pessoas) || 0));
        const posicaoChao = obterPosicaoChao(ponto);
        const grupo = document.createElement('a-entity');

        grupo.setAttribute('position', `${posicaoChao.x} ${posicaoChao.y} ${posicaoChao.z}`);
        grupo.setAttribute('data-id', ponto.id || 'sem-id');
        grupo.setAttribute('title', `${ponto.id || 'ponto'}: ${pessoas} pessoas`);

        criarParticulasHeatmap(pessoas).forEach((particula) => {
          const elemento = document.createElement('a-sphere');
          elemento.setAttribute('position', `${particula.x} ${particula.y} ${particula.z}`);
          elemento.setAttribute('radius', particula.raio);
          elemento.setAttribute(
            'material',
            `shader: flat; color: ${particula.cor}; emissive: ${particula.cor}; transparent: true; opacity: ${particula.opacidade}; depthTest: false; depthWrite: false`
          );
          grupo.appendChild(elemento);
        });

        camadaHeatmap.appendChild(grupo);
      });
    }

    function obterPosicaoChao(ponto) {
      return {
        x: Number(ponto.x) || 0,
        y: Number.isFinite(ponto.y) ? ponto.y : ALTURA_HEATMAP,
        z: Number(ponto.z) || 0
      };
    }

    function obterCorPorDensidade(pessoas) {
      if (pessoas <= 20) return '#ffc1c1';
      if (pessoas <= 40) return '#ff8a8a';
      if (pessoas <= 60) return '#ff5252';
      if (pessoas <= 80) return '#e53935';
      return '#b71c1c';
    }

    function criarParticulasHeatmap(pessoas) {
      const intensidade = Math.max(0, Math.min(1, pessoas / 100));
      const quantidade = 12 + Math.round(intensidade * 28);
      const raioNuvem = 0.18 + intensidade * 0.55;
      const particulas = [];

      for (let indice = 0; indice < quantidade; indice += 1) {
        const angulo = (Math.PI * 2 * indice) / quantidade;
        const espalhamento = raioNuvem * (0.35 + ((indice % 7) / 10));
        const altura = (indice % 5) * 0.018;
        particulas.push({
          x: Math.cos(angulo) * espalhamento,
          y: altura,
          z: Math.sin(angulo) * espalhamento,
          raio: 0.035 + intensidade * 0.045,
          cor: obterCorPorDensidade(Math.min(100, pessoas + indice)),
          opacidade: 0.22 + intensidade * 0.45
        });
      }

      particulas.push({
        x: 0,
        y: 0.06 + intensidade * 0.04,
        z: 0,
        raio: 0.06 + intensidade * 0.05,
        cor: intensidade > 0.75 ? '#ff2d20' : intensidade > 0.45 ? '#ff7a1a' : '#ffd84d',
        opacidade: 0.85
      });

      return particulas;
    }

    function obterRaioPorDensidade(pessoas) {
      return 0.12 + (Math.max(0, Math.min(100, pessoas)) / 100) * 0.32;
    }

    function obterOpacidadePorDensidade(pessoas) {
      return 0.1 + (Math.max(0, Math.min(100, pessoas)) / 100) * 0.22;
    }

    carregarDadosHeatmap();
    setInterval(carregarDadosHeatmap, INTERVALO_ATUALIZACAO_MS);
  </script>

</body>

</html>
